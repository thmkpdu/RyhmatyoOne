<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set times</title>
    <link rel="stylesheet" href="./css/settimes_style.css">
</head>
<body>
    <div id="header">
        <h1>Set opening and closing times</h1>
        <button id="btnLogout">Log out</button>
    </div>
    <div id="descriptions">
        <p>Is open</p>
        <p>Weekday</p>
        <p>Opening</p>
        <p>Closing</p>
    </div>
    <hr width="100%" size="2" color="black">
    <div id="weekdayInputs">
        <form method="post" id="weekdayForm">
            <div id="divMon" class="dayDiv">
                <input type="checkbox" id="chbMon" name="Mon">
                <p class="theDay">Monday</p>
                <input name="MonOpenHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="MonOpenMin" type=number min="0", max="59">
                <p class="arrow">-></p>
                <input name="MonCloseHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="MonCloseMin" type=number min="0", max="59">
            </div>
            <div id="divTue" class="dayDiv">
                <input type="checkbox" id="chbTue" name="Tue">
                <p class="theDay">Tuesday</p>
                <input name="TueOpenHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="TueOpenMin" type=number min="0", max="59">
                <p class="arrow">-></p>
                <input name="TueCloseHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="TueCloseMin" type=number min="0", max="59">
            </div>
            <div id="divWed" class="dayDiv">
                <input type="checkbox" id="chbWed" name="Wed">
                <p class="theDay">Wednesday</p>
                <input name="WedOpenHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="WedOpenMin" type=number min="0", max="59">
                <p class="arrow">-></p>
                <input name="WedCloseHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="WedCloseMin" type=number min="0", max="59">
            </div>
            <div id="divThu" class="dayDiv">
                <input type="checkbox" id="chbThu" name="Thu">
                <p class="theDay">Thursday</p>
                <input name="ThuOpenHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="ThuOpenMin" type=number min="0", max="59">
                <p class="arrow">-></p>
                <input name="ThuCloseHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="ThuCloseMin" type=number min="0", max="59">
            </div>
            <div id="divFri" class="dayDiv">
                <input type="checkbox" id="chbFri" name="Fri">
                <p class="theDay">Friday</p>
                <input name="FriOpenHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="FriOpenMin" type=number min="0", max="59">
                <p class="arrow">-></p>
                <input name="FriCloseHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="FriCloseMin" type=number min="0", max="59">
            </div>
            <div id="divSat" class="dayDiv">
                <input type="checkbox" id="chbSat" name="Sat">
                <p class="theDay">Saturday</p>
                <input name="SatOpenHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="SatOpenMin" type=number min="0", max="59">
                <p class="arrow">-></p>
                <input name="SatCloseHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="SatCloseMin" type=number min="0", max="59">
            </div>
            <div id="divSun" class="dayDiv">
                <input type="checkbox" id="chbSun" name="Sun">
                <p class="theDay">Sunday</p>
                <input name="SunOpenHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="SunOpenMin" type=number min="0", max="59">
                <p class="arrow">-></p>
                <input name="SunCloseHour" type=number min="0", max="23">
                <p class="doubleDot">:</p>
                <input name="SunCloseMin" type=number min="0", max="59">
            </div>
            <button id="btnOk">OK</button>
            <button id="btnCancel">Cancel</button>
        </form>
    </div>
</body>
</html>
