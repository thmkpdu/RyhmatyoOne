<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set times</title>
    <link rel="stylesheet" href="./css/settimes_style.css">
</head>
<body>
    <div id="header">
        <h1>Set opening and closing times</h1>
        <button id="btnLogout">Log out</button>
    </div>
    <div id="descriptions">
        <p>Is open</p>
        <p>Weekday</p>
        <p>Opening</p>
        <p>Closing</p>
    </div>
    <hr width="100%" size="2" color="black">
    <div id="weekdayInputs">
        <form method="post">
            <div id="divMon" class="dayDiv">
                <input type="checkbox" id="chbMon">
                <p>Monday</p>
                <input name="MonOpen" type=text>
                <input name="MonClose" type=text>
                <button id="btnMonOk">OK</button>
                <button id="btnMonCancel">Cancel</button>
            </div>
            <div id="divTue" class="dayDiv">
                <input type="checkbox" id="chbTue">
                <p>Tuesday</p>
                <input name="TueOpen" type=text>
                <input name="TueClose" type=text>
                <button id="btnTueOk">OK</button>
                <button id="btnTueCancel">Cancel</button>
            </div>
            <div id="divWed" class="dayDiv">
                <input type="checkbox" id="chbWed">
                <p>Wednesday</p>
                <input name="WedOpen" type=text>
                <input name="WedClose" type=text>
                <button id="btnWedOk">OK</button>
                <button id="btnWedCancel">Cancel</button>
            </div>
            <div id="divThu" class="dayDiv">
                <input type="checkbox" id="chbThu">
                <p>Thursday</p>
                <input name="ThuOpen" type=text>
                <input name="ThuClose" type=text>
                <button id="btnThuOk">OK</button>
                <button id="btnThuCancel">Cancel</button>
            </div>
            <div id="divFri" class="dayDiv">
                <input type="checkbox" id="chbFri">
                <p>Friday</p>
                <input name="FriOpen" type=text>
                <input name="FriClose" type=text>
                <button id="btnFriOk">OK</button>
                <button id="btnFriCancel">Cancel</button>
            </div>
            <div id="divSat" class="dayDiv">
                <input type="checkbox" id="chbSat">
                <p>Saturday</p>
                <input name="SatOpen" type=text>
                <input name="SatClose" type=text>
                <button id="btnSatOk">OK</button>
                <button id="btnSatCancel">Cancel</button>
            </div>
            <div id="divSun" class="dayDiv">
                <input type="checkbox" id="chbSun">
                <p>Sunday</p>
                <input name="SunOpen" type=text>
                <input name="SunClose" type=text>
                <button id="btnSunOk">OK</button>
                <button id="btnSunCancel">Cancel</button>
            </div>
        </form>
    </div>
</body>
</html>
